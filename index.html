<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Marco Mondini — Mondspace</title>
  <meta name="description" content="Marco Mondini — engineering leader, hands-on developer. Explore a little voxel world." />
  <meta name="theme-color" content="#7ec0ee" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@500;700&family=Press+Start+2P&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />

  <script
    src="https://cdn.telemetrydeck.com/websdk/telemetrydeck.min.js"
    data-app-id="DDDD9356-A027-4A8A-9C21-0BBF37511614"
  ></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- ============ Loading splash ============ -->
  <div id="splash" role="status" aria-live="polite">
    <div class="splash-inner">
      <div class="splash-logo" aria-hidden="true">
        <span>M</span><span>O</span><span>N</span><span>D</span><span>S</span><span>P</span><span>A</span><span>C</span><span>E</span>
      </div>
      <div class="splash-bar"><div class="splash-bar-fill" id="splash-fill"></div></div>
      <div class="splash-status" id="splash-status">Generating world…</div>
    </div>
  </div>

  <!-- ============ 3D world ============ -->
  <canvas id="scene"></canvas>

  <!-- Tall spacer that gives the page something to scroll on touch devices -->
  <div id="scroll-track" aria-hidden="true"></div>

  <!-- ============ HUD overlay ============ -->
  <div id="hud" aria-hidden="false">
    <nav class="hud-nav" aria-label="Main navigation">
      <a class="brand" href="#" id="brand">Marco Mondini</a>
      <div class="links" id="links"></div>
    </nav>

    <!-- Floating, world-anchored narration panel -->
    <div id="narration" class="narration" role="region" aria-label="About Marco">
      <div class="narration-card">
        <div class="narration-label" id="narration-label"></div>
        <p class="narration-text" id="narration-text"></p>

        <!-- Jukebox controls, revealed only in the audio area -->
        <div id="jukebox" class="jukebox" hidden>
          <button id="audio-btn" type="button" aria-label="Play audio CV" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true"><polygon points="8,5 19,12 8,19"></polygon></svg>
          </button>
          <span class="jukebox-status" id="audio-status">8 min · Play</span>
        </div>
      </div>
    </div>

    <!-- Compass / area minimap -->
    <div class="compass" id="compass" aria-hidden="true">
      <span class="dot up"></span>
      <span class="dot left"></span>
      <span class="dot center"></span>
      <span class="dot right"></span>
      <span class="dot down"></span>
    </div>

    <div class="hint" id="hint"></div>
  </div>

  <div class="cursor" id="cursor" aria-hidden="true"></div>

  <audio id="audio" preload="none" tabindex="-1" aria-hidden="true">
    <source src="mmcv-2025-05-26.m4a" type="audio/mp4" />
  </audio>

  <noscript>
    <p style="color:#fff;font-family:monospace;padding:2rem;">
      This site is an interactive voxel world that needs JavaScript. I'm Marco Mondini —
      engineering leader and hands-on developer. Find me on
      <a style="color:#FF9800" href="https://github.com/mondial7">GitHub</a> and
      <a style="color:#FF9800" href="https://linkedin.com/in/mondinimarco/">LinkedIn</a>.
    </p>
  </noscript>

  <script type="module" src="js/main.js"></script>
</body>
</html>
